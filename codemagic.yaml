workflows:
  android-debug-build:
    name: ExpenseTracker Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Reconstruct project folder structure
        script: |
          set -e

          # ── Gradle wrapper ───────────────────────────────────────────────
          mkdir -p gradle/wrapper
          cp gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          cp libs.versions.toml        gradle/libs.versions.toml

          # ── App module folders ───────────────────────────────────────────
          mkdir -p app/src/main/java/com/expensetracker/data/db
          mkdir -p app/src/main/java/com/expensetracker/data/repository
          mkdir -p app/src/main/java/com/expensetracker/domain/model
          mkdir -p app/src/main/java/com/expensetracker/presentation/dashboard
          mkdir -p app/src/main/java/com/expensetracker/presentation/transactions
          mkdir -p app/src/main/java/com/expensetracker/presentation/budget
          mkdir -p app/src/main/java/com/expensetracker/presentation/ui/theme
          mkdir -p app/src/main/java/com/expensetracker/service
          mkdir -p app/src/main/java/com/expensetracker/utils
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          SRC=app/src/main/java/com/expensetracker

          # app/build.gradle.kts (was saved as app.build.gradle.kts to avoid name clash)
          cp app.build.gradle.kts app/build.gradle.kts

          # Root package
          cp MainActivity.kt        $SRC/MainActivity.kt
          cp AppModule.kt           $SRC/AppModule.kt
          cp ExpenseTrackerApp.kt   $SRC/ExpenseTrackerApp.kt

          # Data layer
          cp Daos.kt                $SRC/data/db/Daos.kt
          cp Entities.kt            $SRC/data/db/Entities.kt
          cp ExpenseDatabase.kt     $SRC/data/db/ExpenseDatabase.kt
          cp Mappers.kt             $SRC/data/db/Mappers.kt
          cp TransactionRepository.kt $SRC/data/repository/TransactionRepository.kt

          # Domain layer
          cp Models.kt              $SRC/domain/model/Models.kt

          # Presentation layer
          cp DashboardScreen.kt     $SRC/presentation/dashboard/DashboardScreen.kt
          cp DashboardViewModel.kt  $SRC/presentation/dashboard/DashboardViewModel.kt
          cp TransactionsScreen.kt  $SRC/presentation/transactions/TransactionsScreen.kt
          cp TransactionViewModel.kt $SRC/presentation/transactions/TransactionViewModel.kt
          cp BudgetScreen.kt        $SRC/presentation/budget/BudgetScreen.kt
          cp BudgetViewModel.kt     $SRC/presentation/budget/BudgetViewModel.kt
          cp SmsPermissionScreen.kt $SRC/presentation/SmsPermissionScreen.kt
          cp Theme.kt               $SRC/presentation/ui/theme/Theme.kt

          # Service & utils
          cp SmsParser.kt           $SRC/service/SmsParser.kt
          cp SmsReceiver.kt         $SRC/service/SmsReceiver.kt
          cp CsvExporter.kt         $SRC/utils/CsvExporter.kt

          # Resources & manifest
          cp AndroidManifest.xml    app/src/main/AndroidManifest.xml
          cp strings.xml            app/src/main/res/values/strings.xml
          cp themes.xml             app/src/main/res/values/themes.xml
          cp file_paths.xml         app/src/main/res/xml/file_paths.xml

          # Verify key files exist
          echo "--- Verifying structure ---"
          ls build.gradle.kts
          ls app/build.gradle.kts
          ls settings.gradle.kts
          ls gradle/libs.versions.toml
          ls gradle/wrapper/gradle-wrapper.properties
          ls app/src/main/AndroidManifest.xml
          echo "✅ Structure OK"

      - name: Download Gradle wrapper jar
        script: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: |
          chmod +x gradlew

      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
